<h1 class="cake-title">Swipe to Cut the Cake 🎂</h1>

<div class="cake-area">

<div id="knife">🔪</div>

<div id="cake">🎂</div>

<div id="cake-pieces">
🍰 🍰 🍰 🍰 🍰 🍰
</div>

<div id="confetti">
🎉 🎊 ✨ 🎉 🎊
</div>

<h2 id="birthday-msg">Happy Birthday 🎉</h2>

</div>

<script>

let startX = 0;
let cake = document.getElementById("cake");

cake.addEventListener("mousedown", function(e){
startX = e.clientX;
});

cake.addEventListener("mouseup", function(e){
let endX = e.clientX;

if(Math.abs(endX - startX) > 80){
cutCake();
}
});

cake.addEventListener("touchstart", function(e){
startX = e.touches[0].clientX;
});

cake.addEventListener("touchend", function(e){
let endX = e.changedTouches[0].clientX;

if(Math.abs(endX - startX) > 80){
cutCake();
}
});

function cutCake(){

document.getElementById("cake").style.display="none";

document.getElementById("knife").style.display="block";

document.getElementById("cake-pieces").style.display="block";

document.getElementById("confetti").style.display="block";

document.getElementById("birthday-msg").style.display="block";

/* play birthday song */
document.getElementById("bdaySong").play();

}
</script>

<audio id="bdaySong" src="_Happy_Birthday_En_Singathuku_Ringtone_(by Fringster.com).mp3"></audio>

</body>
</html>
